version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://algoedu:algoedu_pass@postgres:5432/algo_edu
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4j_password
      - REDIS_URL=redis://redis:6379/0
      - JWT_PRIVATE_KEY_PATH=/app/secrets/jwt-private.pem
      - JWT_PUBLIC_KEY_PATH=/app/secrets/jwt-public.pem
      - JWT_ALGORITHM=RS256
      - RATE_LIMIT_ENABLED=true
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      - APP_ENV=development
      - APP_DEBUG=true
    volumes:
      - ./src:/app/src:ro
      - ./secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - algo-edu-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=algoedu
      - POSTGRES_PASSWORD=algoedu_pass
      - POSTGRES_DB=algo_edu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algoedu -d algo_edu"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - algo-edu-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - algo-edu-network

  neo4j:
    image: neo4j:5.27-community
    environment:
      - NEO4J_AUTH=neo4j/neo4j_password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2g
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - algo-edu-network

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:

networks:
  algo-edu-network:
    driver: bridge
